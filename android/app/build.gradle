plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

def dartDefines = [:];
if (project.hasProperty('dart-defines')) {
    dartDefines = project.property('dart-defines')
        .split(',')
        .collectEntries { entry ->
            def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
            [(pair.first()): pair.last()]
        }
}

android {
    namespace = "com.harmony.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    defaultConfig {
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName

        // --dart-define-from-file=configs/example.json
        resValue "string", "app_name", dartDefines.containsKey('APP_NAME') ? dartDefines.APP_NAME : 'Harmony'
        resValue "string", "app_scheme", dartDefines.containsKey('APP_SCHEME') ? dartDefines.APP_SCHEME : 'harmony'
    }

    flavorDimensions "dimension", "flavor"
    productFlavors {
        twentythree {
            dimension "dimension"
            applicationId "com.harmony.twentythree" // or you can 'com.harmony.app.sambath'
        }

        sambath {
            dimension "dimension"
            applicationId "com.harmony.sambath" // or you can 'com.harmony.app.sambath'
        }

        prod {
            dimension "flavor"
            versionNameSuffix "-prod"
        }
        
        dev {
            dimension "flavor"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
        }
        
        stg {
            dimension "flavor"
            applicationIdSuffix ".stg"
            versionNameSuffix "-stg"
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
