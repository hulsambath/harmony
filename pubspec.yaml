name: harmony
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_launcher_icons: ^0.14.2
  flutter_gen: ^5.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_gen_runner: ^5.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - path: assets/sambath/staging/icons/
      flavors:
        - sambathStg
    - path: assets/quartz/staging/icons/
      flavors:
        - quartzStg
